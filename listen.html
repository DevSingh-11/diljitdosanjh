<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Listen</title>
</head>
<body class="has-content">
  <nav class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-icon">
        <img src="images/home-icon.png" alt="Home" class="icon-img">
      </a>
    </div>
    <div class="nav-center">
      <a href="games.html" class="nav-link">Games</a>
      <a href="listen.html" class="nav-link active">Listen</a>
      <a href="lyrics.html" class="nav-link">Lyrics</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle">
        <img src="images/moon.png" alt="Toggle Dark Mode" class="icon-img">
      </button>
    </div>
  </nav>

  <script>
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'dark') {
      document.body.classList.add('dark');
      document.querySelector('.theme-toggle img').src = "images/sun.png";
    }

    const toggle = document.querySelector('.theme-toggle');
    toggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const icon = document.querySelector('.theme-toggle img');
      if (document.body.classList.contains('dark')) {
        localStorage.setItem('theme', 'dark');
        icon.src = "images/sun.png";
      } else {
        localStorage.setItem('theme', 'light');
        icon.src = "images/moon.png";
      }
    });
  </script>
</body>
</html>
