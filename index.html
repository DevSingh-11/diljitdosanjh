<!-- desktop/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diljit Dosanjh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-icon" title="Home">
        <img src="images/home-icon.png" alt="Home" class="icon-img" />
      </a>
    </div>
    <nav class="nav-center">
      <a href="games.html" class="nav-link">GAMES</a>
      <a href="listen.html" class="nav-link">LISTEN</a>
      <a href="lyrics.html" class="nav-link">LYRICS</a>
    </nav>
    <div class="nav-right">
      <button class="settings-btn" onclick="toggleSettings()" aria-label="Settings">
        <img src="images/settings-icon.png" alt="Settings" class="icon-img" />
      </button>
      <div id="settings-menu" class="settings-menu hidden" role="menu" aria-hidden="true">
        <button onclick="switchTo('desktop')">Desktop Mode</button>
        <button onclick="switchTo('mobile')">Mobile Mode</button>
        <button onclick="toggleTheme()">Toggle Light/Dark Mode</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Welcome to the World of Diljit Dosanjh</h1>
      <p>Explore his music, lyrics, games, and more.</p>
    </section>
  </main>

  <script>
    function toggleSettings() {
      const menu = document.getElementById('settings-menu');
      menu.classList.toggle('hidden');
      menu.setAttribute('aria-hidden', menu.classList.contains('hidden'));
    }

    function switchTo(mode) {
      if (mode === 'desktop') {
        window.location.href = '../desktop/index.html';
      } else if (mode === 'mobile') {
        window.location.href = '../mobile/index.html';
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
    }
  </script>
</body>
</html>
