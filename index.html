<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diljit Dosanjh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-icon" title="Home">
        <img src="images/home-icon.png" alt="Home" class="icon-img" />
      </a>
    </div>

    <nav class="nav-center">
      <a href="games.html" class="nav-link active">GAMES</a>
      <a href="listen.html" class="nav-link">LISTEN</a>
      <a href="lyrics.html" class="nav-link">LYRICS</a>
    </nav>

    <div class="nav-right">
      <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
        <img src="images/moon.png" alt="Toggle Theme" class="icon-img" id="theme-icon" />
      </button>
    </div>
  </header>

  <main>
    <section class="background-section"></section>

    <section class="hero">
      <h1>Welcome to the World of Diljit Dosanjh</h1>
      <p>Explore his music, lyrics, games, and more.</p>
    </section>
  </main>

  <script>
    // Dark mode toggle script
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      themeIcon.src = 'images/sun.png';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeIcon.src = isDark ? 'images/sun.png' : 'images/moon.png';
    });

    // Sliding underline navigation script
    const navCenter = document.querySelector('.nav-center');
    const links = document.querySelectorAll('.nav-link');

    // Create the underline element
    const underline = document.createElement('div');
    underline.classList.add('nav-underline');
    navCenter.appendChild(underline);

    function moveUnderlineTo(link) {
      const rect = link.getBoundingClientRect();
      const parentRect = navCenter.getBoundingClientRect();
      underline.style.width = `${rect.width}px`;
      underline.style.left = `${rect.left - parentRect.left}px`;
    }

    // Initialize underline on the active link (or first link if none active)
    let activeLink = document.querySelector('.nav-link.active') || links[0];
    if (!activeLink.classList.contains('active')) {
      activeLink.classList.add('active');
    }
    moveUnderlineTo(activeLink);

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        moveUnderlineTo(link);
      });
    });

    window.addEventListener('resize', () => {
      const active = document.querySelector('.nav-link.active');
      if (active) {
        moveUnderlineTo(active);
      }
    });
  </script>
</body>
</html>
