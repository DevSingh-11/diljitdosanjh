<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diljit Dosanjh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-icon" title="Home">
        <img src="images/home-icon.png" alt="Home" class="icon-img" />
      </a>
    </div>

    <nav class="nav-center">
      <a href="games.html" class="nav-link">GAMES</a>
      <a href="listen.html" class="nav-link">LISTEN</a>
      <a href="lyrics.html" class="nav-link">LYRICS</a>
    </nav>

    <div class="nav-right">
      <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
        <img src="images/moon.png" alt="Toggle Theme" class="icon-img" id="theme-icon" />
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Welcome to the World of Diljit Dosanjh</h1>
      <p>Explore his music, lyrics, games, and more.</p>
    </section>
  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    // Apply saved theme on load
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      themeIcon.src = 'images/sun.png';
    }

    themeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeIcon.src = isDark ? 'images/sun.png' : 'images/moon.png';
    });
  </script>
</body>
</html>
