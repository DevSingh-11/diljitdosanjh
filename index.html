<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diljit Dosanjh</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="index.html" class="nav-icon" title="Home">
        <img src="images/home-icon.png" alt="Home" class="icon-img" />
      </a>
    </div>
    <nav class="nav-center">
      <a href="games.html" class="nav-link">GAMES</a>
      <a href="listen.html" class="nav-link">LISTEN</a>
      <a href="lyrics.html" class="nav-link">LYRICS</a>
    </nav>
    <div class="nav-right">
      <div class="settings-wrapper" aria-label="Settings">
        <div class="settings-container" id="settings-toggle" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false">
          <img src="images/settings-icon.png" alt="Settings" class="icon-img settings-icon" />
        </div>
        <div class="settings-menu" role="menu" id="settings-menu">
          <button onclick="switchTo('desktop')">Desktop Mode</button>
          <button onclick="switchTo('mobile')">Mobile Mode</button>
          <button onclick="toggleTheme()">Toggle Light/Dark Mode</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Welcome to the World of Diljit Dosanjh</h1>
      <p>Explore his music, lyrics, games, and more.</p>
    </section>
  </main>

  <script>
    function switchTo(mode) {
      if (mode === 'desktop') {
        window.location.href = '../desktop/index.html';
      } else if (mode === 'mobile') {
        window.location.href = '../mobile/index.html';
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
    }

    // Toggle settings menu visibility on icon click
    const settingsToggle = document.getElementById('settings-toggle');
    const settingsMenu = document.getElementById('settings-menu');

    settingsToggle.addEventListener('click', () => {
      const isShown = settingsMenu.classList.toggle('show');
      settingsToggle.setAttribute('aria-expanded', isShown);
    });

    // Close settings menu if clicking outside
    document.addEventListener('click', (event) => {
      if (!settingsToggle.contains(event.target) && !settingsMenu.contains(event.target)) {
        settingsMenu.classList.remove('show');
        settingsToggle.setAttribute('aria-expanded', false);
      }
    });
  </script>
</body>
</html>
